name: spendwise
description: Gestione intelligente delle spese personali
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # Local database (SQLite)
  drift: ^2.30.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP
  dio: ^5.4.3
  retrofit: ^4.9.2

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  crypto: ^3.0.6

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Charts
  fl_chart: ^0.68.0

  # UI utilities
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Notifications
  flutter_local_notifications: ^17.2.0

  # Utilities
  uuid: ^4.4.0
  shared_preferences: ^2.3.1
  url_launcher: ^6.3.0
  share_plus: ^12.0.2

  # Icons
  flutter_svg: ^2.0.10+1
  material_design_icons_flutter: ^7.0.7296
  image_picker: ^1.2.2
  mobile_scanner: ^7.2.0
  google_mlkit_text_recognition: ^0.15.1
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.10.5
  freezed: ^3.2.5
  json_serializable: ^6.11.4
  retrofit_generator: ^10.2.3
  drift_dev: ^2.30.0

flutter:
  uses-material-design: true
  generate: true  # per l10n

  assets:
    - assets/icons/categories/
    - assets/images/
    - assets/fonts/
